<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Finder Redirect - JOB Verse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .redirect-card {
            max-width: 560px;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 1.5rem;
        }

        a {
            color: #22d3ee;
            text-decoration: none;
            font-weight: 600;
        }

        .hint {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1rem;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 1rem;
            background: #22d3ee;
            color: #0f172a;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <h1>Opening Agentic Job Finder…</h1>
        <p id="status-text">Checking local Streamlit service…</p>
        <a class="btn" href="http://localhost:8501">Open Agentic Job Finder</a>
        <p class="hint">
            If this keeps failing, start the module from project root using:<br>
            <strong>JOB-Verse\\launch_agentic_job_search.ps1</strong>
        </p>
    </div>

    <script>
        const targetUrl = 'http://localhost:8501';
        const statusText = document.getElementById('status-text');

        function redirectNow() {
            statusText.textContent = 'Streamlit detected. Redirecting…';
            window.location.href = targetUrl;
        }

        async function checkAndRedirect() {
            try {
                const response = await fetch(targetUrl, { mode: 'no-cors' });
                if (response) {
                    redirectNow();
                    return;
                }
            } catch (error) {
                statusText.textContent = 'Streamlit app is not running yet.';
            }
        }

        setTimeout(checkAndRedirect, 100);
    </script>
</body>
</html>
